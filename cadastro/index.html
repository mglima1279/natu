<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natu | Cadastro</title>

    <link rel="stylesheet" href="../root.css">
    <link rel="stylesheet" href="style.css">

    <link rel="shortcut icon" href="../img/geral/nobgLogo.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="logo">
            <img src="../img/geral/nobgLogo.png" alt="logo">
        </div>

        <div class="menu">
            <a href="../">Loja</a>
            <a href="./">Cadastro</a>
        </div>

        <div class="rightSide">
            <div class="userInfo" id="userInfo" style="display: none;">
                <span>Olá, <strong id="userNameDisplay">Usuário</strong></span>
            </div>

            <div class="cart">
                <a href="../cart/">
                    Carrinho
                </a>
            </div>
        </div>
    </header>

    <main>
        <h1 id="formTitle">CADASTRO</h1>
        <form id="mainForm">
            <div class="formItem registerOnly">
                <label for="nam">Nome*</label>
                <input type="text" placeholder="Digite aqui..." name="nam" id="nam" required>
            </div>

            <div class="formItem registerOnly">
                <label for="secNam">Sobrenome*</label>
                <input type="text" placeholder="Digite aqui..." name="secNam" id="secNam" required>
            </div>

            <div class="formItem registerOnly">
                <label for="cpf">CPF*</label>
                <input type="text" inputmode="numeric" pattern="\d{11}" placeholder="Digite aqui..." name="cpf" id="cpf"
                    maxlength="11" required>
            </div>

            <div class="formItem registerOnly">
                <label for="tel">Telefone*</label>
                <input type="text" inputmode="numeric" placeholder="Digite aqui..." name="tel" id="tel" pattern="\d{11}"
                    maxlength="11" required>
            </div>

            <div class="formItem">
                <label for="email">Email*</label>
                <input type="email" placeholder="Digite aqui..." name="email" id="email" required>
            </div>

            <div class="formItem registerOnly">
                <label for="birth">Data de nascimento*</label>
                <input type="date" name="birth" id="birth" required>
            </div>

            <div class="formItem registerOnly">
                <label for="cep">CEP*</label>
                <input type="text" placeholder="00000000" inputmode="numeric" name="cep" id="cep" pattern="\d{8}" maxlength="8" required>
            </div>

            <div class="formItem hiddenItem">
                <label for="logr">Logradouro</label>
                <input type="text" name="logr" id="logr" disabled class="addressInput" required>
            </div>

            <div class="formItem hiddenItem">
                <label for="comp">Complemento</label>
                <input type="text" placeholder="Digite aqui..." name="comp" id="comp" class="addressInput">
            </div>

            <div class="formItem hiddenItem">
                <label for="num">Número</label>
                <input type="number" placeholder="Digite aqui..." name="num" id="num" class="addressInput">
            </div>

            <div class="formItem">
                <label for="password">Senha*</label>
                <div class="pass-wrapper">
                    <input type="password" placeholder="Digite aqui..." name="password" id="password" required>
                    <button type="button" id="togglePasswordBtn">Mostrar</button>
                </div>
            </div>

            <div class="registerOnly">
                <input type="checkbox" name="notif" id="notif">
                <label for="notif">Desejo receber ofertas pelo email e pelo WhatsApp</label>
            </div>

            <div>
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Limpar">
            </div>
            
            <button id="toggleModeBtn">Já tem uma conta? Faça Login</button>
        </form>
    </main>

    <footer>
        <div class="pagamentos">
            <h3>PAGAMENTOS</h3>
            <ul>
                <li>Pix</li>
                <li>Débito</li>
                <li>Crédito</li>
            </ul>
        </div>
    </footer>

    <script type="module" src="../js/public.js" defer></script>
    <script src="../js/public.js"></script>
</body>

</html>
